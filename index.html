<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sketchboard — Drawing Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <h1>Sketchboard</h1>
    </div>
    <p class="brand-sub">draw something</p>
  </header>

  <div class="app">

    <!-- Toolbar: left rail on desktop, bottom bar on mobile -->
    <aside class="toolbar" id="toolbar">

      <div class="tool-group" role="group" aria-label="Drawing tools">
        <button class="tool-btn active" data-tool="pen" aria-label="Pen tool" title="Pen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="M2 2l7.586 7.586"/>
            <circle cx="11" cy="11" r="2"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="eraser" aria-label="Eraser tool" title="Eraser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 20H7L3.5 16.5a2 2 0 0 1 0-2.83l8.17-8.17a2 2 0 0 1 2.83 0l5.5 5.5a2 2 0 0 1 0 2.83L14.5 20"/>
            <path d="M12.5 6.5l6 6"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="line" aria-label="Line tool" title="Line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="5" y1="19" x2="19" y2="5"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="rect" aria-label="Rectangle tool" title="Rectangle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="6" width="16" height="12" rx="1.5"/>
          </svg>
        </button>

        <button class="tool-btn" data-tool="circle" aria-label="Circle tool" title="Circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="8"/>
          </svg>
        </button>
      </div>

      <div class="divider"></div>

      <div class="control-group">
        <label for="colorPicker" class="control-label">Colour</label>
        <input type="color" id="colorPicker" value="#7c5cff" aria-label="Pick colour" />
      </div>

      <div class="control-group">
        <label for="brushSize" class="control-label">
          Size <span id="brushSizeValue">6</span>px
        </label>
        <input type="range" id="brushSize" min="1" max="60" value="6" aria-label="Brush size" />
      </div>

      <div class="divider"></div>

      <div class="control-group actions">
        <button class="action-btn" id="clearBtn" title="Clear canvas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          <span>Clear</span>
        </button>

        <button class="action-btn primary" id="saveBtn" title="Save as image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Save</span>
        </button>
      </div>
    </aside>

    <!-- Canvas stage -->
    <main class="stage">
      <div class="canvas-card">
        <canvas id="drawCanvas"></canvas>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
